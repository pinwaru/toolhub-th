<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAT Calculator | ToolHub TH</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">
  
</head>
<body>

<div class="container">

<h1>💰 VAT Calculator</h1>

<input type="number" id="price" placeholder="กรอกราคา">

<button onclick="calculateVAT()">คำนวณ</button>

<div class="result" id="result"></div>

<a class="back" href="../index.html">← กลับหน้าแรก</a>

</div>

<script>

function calculateVAT(){

let price=parseFloat(document.getElementById("price").value);

if(isNaN(price)){
document.getElementById("result").innerHTML="กรุณากรอกราคา";
return;
}

let vat=price*0.07;
let total=price+vat;

document.getElementById("result").innerHTML=
"VAT = "+vat.toFixed(2)+" บาท<br><br>รวม = "+total.toFixed(2)+" บาท";

}

</script>

</body>
</html>
