<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator | ToolHub TH</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Kanit',sans-serif;
background:#f4f7fb;
}

.container{
max-width:600px;
margin:60px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
font-size:18px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
line-height:1.8;
}

.back{
display:block;
text-align:center;
margin-top:25px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>⚖️ BMI Calculator</h1>

<input type="number" id="weight" placeholder="น้ำหนัก (กก.)">

<input type="number" id="height" placeholder="ส่วนสูง (ซม.)">

<button onclick="calculateBMI()">
คำนวณ BMI
</button>

<div class="result" id="result"></div>

<a class="back" href="../index.html">
← กลับหน้าแรก
</a>

</div>

<script>

function calculateBMI(){

const weight=parseFloat(document.getElementById("weight").value);
const height=parseFloat(document.getElementById("height").value)/100;

if(isNaN(weight)||isNaN(height)||height<=0){

document.getElementById("result").innerHTML="กรุณากรอกข้อมูลให้ครบ";

return;

}

const bmi=weight/(height*height);

let status="";

if(bmi<18.5){

status="น้ำหนักน้อย";

}else if(bmi<23){

status="น้ำหนักปกติ";

}else if(bmi<25){

status="น้ำหนักเกิน";

}else if(bmi<30){

status="โรคอ้วนระดับ 1";

}else{

status="โรคอ้วนระดับ 2";

}

document.getElementById("result").innerHTML=
"ค่า BMI ของคุณคือ<br><br><strong>"+bmi.toFixed(2)+"</strong><br>"+status;

}

</script>

</body>
</html>
