<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator | ToolHub TH</title>

<style>

body{
    font-family:'Kanit',sans-serif;
    background:#f4f7fb;
    margin:0;
    padding:40px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h1{
    color:#2563eb;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    margin:20px 0;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#result{
    margin-top:25px;
    font-size:22px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🎂 Age Calculator</h1>

<p>เลือกวันเกิดของคุณ</p>

<input type="date" id="birthdate">

<button onclick="calculateAge()">
คำนวณอายุ
</button>

<div id="result"></div>

</div>

<script>

function calculateAge(){

const birth=new Date(document.getElementById("birthdate").value);

const today=new Date();

let age=today.getFullYear()-birth.getFullYear();

const month=today.getMonth()-birth.getMonth();

if(month<0 || (month===0 && today.getDate()<birth.getDate())){
age--;
}

document.getElementById("result").innerHTML=
"อายุของคุณคือ <br><br>"+age+" ปี";

}

</script>

</body>
</html>
