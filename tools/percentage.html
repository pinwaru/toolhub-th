<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เครื่องคิดเปอร์เซ็นต์ | ToolHub TH</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Kanit',sans-serif;
background:#f4f7fb;
}

.container{
max-width:600px;
margin:60px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
font-size:18px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.back{
display:block;
text-align:center;
margin-top:25px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>🧮 เครื่องคิดเปอร์เซ็นต์</h1>

<input type="number" id="number" placeholder="จำนวน">

<input type="number" id="percent" placeholder="เปอร์เซ็นต์ (%)">

<button onclick="calculate()">คำนวณ</button>

<div class="result" id="result"></div>

<a class="back" href="../index.html">← กลับหน้าแรก</a>

</div>

<script>
function calculate(){

let number=parseFloat(document.getElementById("number").value);
let percent=parseFloat(document.getElementById("percent").value);

if(isNaN(number)||isNaN(percent)){
document.getElementById("result").innerHTML="กรุณากรอกข้อมูลให้ครบ";
return;
}

let answer=number*percent/100;

document.getElementById("result").innerHTML=
percent+"% ของ "+number+" = <br><br>"+answer.toFixed(2);

}
</script>

</body>
</html>
