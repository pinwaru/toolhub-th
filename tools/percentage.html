<h1>🧮 เครื่องคิดเปอร์เซ็นต์</h1>

<input type="number" id="number" placeholder="จำนวน">

<input type="number" id="percent" placeholder="เปอร์เซ็นต์ (%)">

<button onclick="calculate()">คำนวณ</button>

<div class="result" id="result"></div>

</div>

<script>
function calculate(){

let number=parseFloat(document.getElementById("number").value);
let percent=parseFloat(document.getElementById("percent").value);

if(isNaN(number)||isNaN(percent)){
document.getElementById("result").innerHTML="กรุณากรอกข้อมูลให้ครบ";
return;
}

let answer=number*percent/100;

document.getElementById("result").innerHTML=
percent+"% ของ "+number+" = <br><br>"+answer.toFixed(2);

}
</script>
