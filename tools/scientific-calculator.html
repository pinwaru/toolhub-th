<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator | ToolHub TH</title>

<meta name="description" content="เครื่องคิดเลขวิทยาศาสตร์ออนไลน์ฟรี รองรับ sin cos tan log ln √ x² xʸ π">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/scientific-calculator.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
<img src="../images/logo.png" alt="ToolHub TH">
<span>ToolHub TH</span>
</div>

<div class="menu">
<a href="../index.html">หน้าแรก</a>
<a href="../blog.html">บทความ</a>
<a href="../about.html">เกี่ยวกับ</a>
<a href="../contact.html">ติดต่อ</a>
</div>

</nav>

<div class="calculator">

<h1>🧪 Scientific Calculator</h1>

<input
id="display"
type="text"
value="0"
readonly
>

<div class="buttons">

<button data-action="clear" class="function">AC</button>
<button data-action="backspace" class="function">⌫</button>
<button data-value="(">(</button>
<button data-value=")">)</button>
<button data-value="/">÷</button>

<button data-action="sin">sin</button>
<button data-action="cos">cos</button>
<button data-action="tan">tan</button>
<button data-action="sqrt">√</button>
<button data-value="%">%</button>

<button data-value="7">7</button>
<button data-value="8">8</button>
<button data-value="9">9</button>
<button data-value="*">×</button>
<button data-action="square">x²</button>

<button data-value="4">4</button>
<button data-value="5">5</button>
<button data-value="6">6</button>
<button data-value="-">−</button>
<button data-action="power">xʸ</button>

<button data-value="1">1</button>
<button data-value="2">2</button>
<button data-value="3">3</button>
<button data-value="+">+</button>
<button data-action="pi">π</button>

<button data-action="negate">±</button>
<button data-value="0">0</button>
<button data-value=".">.</button>
<button data-action="equals" class="equal">=</button>
<button data-action="log">log</button>

<button data-action="ln">ln</button>

</div>
  
<footer>

<p>© 2026 ToolHub TH.</p>

</footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/14.6.0/math.min.js"></script>
<script src="../js/scientific-calculator.js"></script>

</body>
</html>
