<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter | ToolHub TH</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Kanit',sans-serif;
background:#f4f7fb;
}

.container{
max-width:700px;
margin:60px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

textarea{
width:100%;
height:220px;
padding:15px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
resize:vertical;
}

.result{
margin-top:25px;
font-size:20px;
line-height:2;
}

.back{
display:block;
text-align:center;
margin-top:30px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>📝 Word Counter</h1>

<textarea id="text" placeholder="พิมพ์ข้อความที่นี่..."></textarea>

<div class="result">
<p>ตัวอักษร: <span id="chars">0</span></p>
<p>คำ: <span id="words">0</span></p>
<p>ประโยค: <span id="sentences">0</span></p>
</div>

<a class="back" href="../index.html">← กลับหน้าแรก</a>

</div>

<script>

const text=document.getElementById("text");

text.addEventListener("input",()=>{

const value=text.value;

document.getElementById("chars").innerText=value.length;

const words=value.trim()===""
?0
:value.trim().split(/\s+/).length;

document.getElementById("words").innerText=words;

const sentences=value.split(/[.!?]+/).filter(s=>s.trim()!=="").length;

document.getElementById("sentences").innerText=sentences;

});

</script>

</body>
</html>
