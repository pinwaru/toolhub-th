<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator | ToolHub TH</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Kanit',sans-serif;
background:#f4f7fb;
}

.container{
max-width:600px;
margin:60px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

h1{
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

img{
margin-top:25px;
max-width:250px;
}

.back{
display:block;
margin-top:30px;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h1>📱 QR Code Generator</h1>

<input
type="text"
id="text"
placeholder="พิมพ์ข้อความหรือลิงก์">

<button onclick="generateQR()">
สร้าง QR Code
</button>

<div id="result"></div>

<a class="back" href="../index.html">
← กลับหน้าแรก
</a>

</div>

<script>

function generateQR(){

const text=document.getElementById("text").value.trim();

if(text===""){
alert("กรุณากรอกข้อความ");
return;
}

document.getElementById("result").innerHTML=
'<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data='
+encodeURIComponent(text)+'">';

}

</script>

</body>
</html>
