<div class="loan-container">

<h1>🏦 Loan Calculator</h1>

<p>คำนวณค่างวดเงินกู้แบบลดต้นลดดอก</p>

<div class="input-group">

<label>จำนวนเงินกู้ (บาท)</label>

<input
type="number"
id="loanAmount"
placeholder="1000000">

</div>

<div class="input-group">

<label>ดอกเบี้ยต่อปี (%)</label>

<input
type="number"
id="interestRate"
placeholder="6">

</div>

<div class="input-group">

<label>ระยะเวลา (ปี)</label>

<input
type="number"
id="loanYears"
placeholder="20">

</div>

<button id="calculateBtn">

คำนวณ

</button>

<div class="result">

<h2>ผลลัพธ์</h2>

<p>ค่างวดต่อเดือน</p>

<h3 id="monthlyPayment">-</h3>

<p>ยอดชำระทั้งหมด</p>

<h3 id="totalPayment">-</h3>

<p>ดอกเบี้ยรวม</p>

<h3 id="totalInterest">-</h3>

</div>
